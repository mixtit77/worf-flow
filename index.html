  <!-- Надежная загрузка библиотек с несколькими CDN-зеркалами + показ ошибок. -->
  <script>
    (function () {
      function showError(message) {
        var root = document.getElementById('root');
        if (!root) return;
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;font-family:Inter,system-ui,sans-serif;">' +
            '<div style="max-width:560px;background:#1E2333;border:1.5px solid #FF5C5C;border-radius:14px;padding:20px;color:#F0F2FF;">' +
              '<div style="font-weight:800;font-size:18px;margin-bottom:10px;">⚠️ Ошибка приложения</div>' +
              '<div style="font-size:13px;color:#FF5C5C;white-space:pre-wrap;word-break:break-word;">' +
                String(message).replace(/[<>&]/g, function (c) { return { '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c]; }) +
              '</div>' +
              '<div style="margin-top:12px;font-size:12px;color:#8892B0;">Похоже, браузер блокирует ВСЕ внешние CDN. Отключи строгую защиту от трекинга/VPN/адблок для этой страницы, либо используй локальные файлы библиотек (папка vendor).</div>' +
            '</div>' +
          '</div>';
      }

      window.addEventListener('error', function (e) {
        if (e && e.target && e.target.tagName === 'SCRIPT') return; // ошибки загрузки скриптов обрабатываем отдельно
        showError((e.message || 'Unknown error') + (e.filename ? ('\n' + e.filename + ':' + e.lineno) : ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var reason = e && e.reason ? (e.reason.message || e.reason) : 'Unhandled promise rejection';
        showError(String(reason));
      });

      // Каждая библиотека: проверка глобала + список зеркал (по приоритету).
      var LIBS = [
        {
          global: 'React',
          urls: [
            'https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
            'https://unpkg.com/react@18.2.0/umd/react.production.min.js'
          ]
        },
        {
          global: 'ReactDOM',
          urls: [
            'https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
            'https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js'
          ]
        },
        {
          global: 'Babel',
          urls: [
            'https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js',
            'https://unpkg.com/@babel/standalone@7.23.10/babel.min.js'
          ]
        },
        {
          global: 'supabase',
          urls: [
            'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.js',
            'https://unpkg.com/@supabase/supabase-js@2.39.7/dist/umd/supabase.js'
          ]
        }
      ];

      function loadWithFallback(urls, index, onOk, onFail) {
        if (index >= urls.length) { onFail(); return; }
        var s = document.createElement('script');
        s.src = urls[index];
        s.async = false;
        s.onload = function () { onOk(); };
        s.onerror = function () { loadWithFallback(urls, index + 1, onOk, onFail); };
        document.head.appendChild(s);
      }

      function loadLib(lib, done) {
        if (window[lib.global]) { done(true); return; }
        loadWithFallback(lib.urls, 0, function () { done(!!window[lib.global]); }, function () { done(false); });
      }

      function loadAll(i) {
        if (i >= LIBS.length) {
          // Все загружено — запускаем Babel-трансформацию inline-скрипта приложения.
          try {
            window.Babel.transformScriptTags();
          } catch (err) {
            showError('Не удалось запустить Babel: ' + (err && err.message ? err.message : err));
          }
          return;
        }
        loadLib(LIBS[i], function (ok) {
          if (!ok) {
            showError('Не удалось загрузить библиотеку: ' + LIBS[i].global +
              '.\nВсе зеркала (jsDelivr, cdnjs, unpkg) недоступны. Проверь интернет/блокировки.');
            return;
          }
          loadAll(i + 1);
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () { loadAll(0); });
      } else {
        loadAll(0);
      }
    })();
  </script>

      book: () => (

      eyeOff: () => (

        </svg>
      )
    };

    const shortId = (id) => id ? `${id.slice(0, 6)}...${id.slice(-4)}` : "-";
    const cleanUsername = (s) => s.trim().toLowerCase();
    const generateUUID = () => 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
      const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
      return v.toString(16);
    });
    const buildInternalEmail = (uuid) => `${uuid}@example.com`;

    // --- Локальное сохранение прогресса (localStorage) ---
    // Используется для гостя и просмотра чужих списков: прогресс не пишется в БД,
    // но сохраняется в браузере и восстанавливается после перезагрузки.
    const PROGRESS_PREFIX = "wordflow_progress_v1";
    const wordKeyOf = (w) => `${norm(w.en)}::${norm(w.ru)}`;

    function loadProgressMap(storageKey) {
      if (!storageKey) return {};
      try {
        const raw = localStorage.getItem(storageKey);
        return raw ? JSON.parse(raw) : {};
      } catch (_) { return {}; }
    }

    function saveProgressMap(storageKey, map) {
      if (!storageKey) return;
      try { localStorage.setItem(storageKey, JSON.stringify(map)); } catch (_) { /* приватный режим/квота */ }
    }

    // Сбрасывает прогресс в ноль (для чужих списков: каждый смотрит «с чистого листа»,
    // а не статистику владельца). Поверх затем накладывается личный локальный прогресс.
    function zeroProgress(words) {
      return words.map((w) => ({ ...w, successCount: 0, learned: false, totalRight: 0, totalWrong: 0 }));
    }

    function applyProgress(words, map) {
      if (!map || Object.keys(map).length === 0) return words;
      return words.map((w) => {
        const p = map[wordKeyOf(w)];
        if (!p) return w;
        return {
          ...w,
          successCount: p.successCount ?? w.successCount,
          learned: p.learned ?? w.learned,
          totalRight: p.totalRight ?? w.totalRight,
          totalWrong: p.totalWrong ?? w.totalWrong,
        };
      });
    }

    function AuthScreen({ onGuest }) {
      const [mode, setMode] = useState("login");
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [errorText, setErrorText] = useState("");
      const [infoText, setInfoText] = useState("");

      const submitAuth = async () => {
        const cleanUser = cleanUsername(username);
        const cleanPassword = password.trim();

        if (cleanUser.length < 3) {
          setErrorText("Имя пользователя должно быть минимум 3 символа");
          return;
        }
        if (!/^[a-z0-9_]+$/.test(cleanUser)) {
          setErrorText("Используй только латиницу, цифры и _");
          return;
        }

        if (cleanPassword.length < 6) {
          setErrorText("Пароль должен быть минимум 6 символов");
          return;
        }

        setLoading(true);
        setErrorText("");
        setInfoText("");

        if (mode === "login") {
          // Ищем в profiles по username, получаем email
          const { data: profileData } = await db
            .from('profiles')
            .select('email')
            .eq('username', cleanUser)
            .maybeSingle();

          if (!profileData?.email) {
            setErrorText("Пользователь не найден");
            setLoading(false);
            return;
          }

          const emailForLogin = profileData.email;
          const { error } = await db.auth.signInWithPassword({ email: emailForLogin, password: cleanPassword });
          if (error) setErrorText(error.message || "Не удалось войти");
        } else {
          const { data: existingProfile } = await db
            .from('profiles')
            .select('id')
            .eq('username', cleanUser)
            .maybeSingle();
          if (existingProfile) {
            setErrorText("Такой юзернейм уже занят");
            setLoading(false);
            return;
          }

          const internalUuid = generateUUID();
          const internalEmail = buildInternalEmail(internalUuid);

          const { data, error } = await db.auth.signUp({
            email: internalEmail,
            password: cleanPassword,
            options: { data: { username: cleanUser } }
          });
          if (error) {
            setErrorText(error.message || "Не удалось создать аккаунт");
            setLoading(false);
            return;
          }

          if (!data?.user?.id) {
            setErrorText("Не удалось получить ID пользователя. Проверь настройки Auth.");
            setLoading(false);
            return;
          }

          // Профиль создается автоматически триггером handle_new_user в БД.
          // На всякий случай дублируем upsert с клиента (best-effort, ошибки не критичны).
          await db.from('profiles').upsert({
            id: data.user.id,
            username: cleanUser,
            email: internalEmail,
            display_name: cleanUser
          }, { onConflict: 'id' });

          // Проверяем, что профиль реально есть в базе (через триггер или upsert).
          const { data: checkProfile } = await db
            .from('profiles')
            .select('id')
            .eq('id', data.user.id)
            .maybeSingle();

          if (!checkProfile) {
            setErrorText("Профиль не сохранился в базе. Запусти SQL-миграцию (таблица profiles + триггер handle_new_user).");
            setLoading(false);
            return;
          }

          // Если подтверждение email отключено, signUp уже создал активную сессию —
          // пользователь автоматически вошел. onAuthStateChange переключит на приложение.
          if (data.session) {
            setInfoText("Аккаунт создан, ты уже вошел!");
          } else {
            setInfoText("Аккаунт создан. Теперь войди по имени пользователя и паролю.");
            setMode("login");
            setUsername(cleanUser);
            setPassword("");
          }
        }
        setLoading(false);
      };

      return (
        <div style={{ background: C.bg, minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ fontSize: 52, marginBottom: 10 }}>📚</div>
          <div style={{ fontWeight: 800, fontSize: 28, color: C.textPrimary, letterSpacing: "-0.5px", marginBottom: 6 }}>WordFlow</div>
          <div style={{ color: C.textSecondary, fontSize: 15, marginBottom: 24 }}>Вход и регистрация</div>
          <div style={{ width: "100%", maxWidth: 420, background: C.surface, border: `1.5px solid ${C.border}`, borderRadius: 14, padding: 18 }}>
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <button onClick={() => { setMode("login"); setErrorText(""); setInfoText(""); setPassword(""); }} style={S.btn({ flex: 1, justifyContent: "center", background: mode === "login" ? C.accent : C.card, color: "#fff" })}>Вход</button>
              <button onClick={() => { setMode("signup"); setErrorText(""); setInfoText(""); setPassword(""); }} style={S.btn({ flex: 1, justifyContent: "center", background: mode === "signup" ? C.accent : C.card, color: "#fff" })}>Регистрация</button>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <input value={username} onChange={(e) => setUsername(e.target.value)} placeholder="Имя пользователя (латиница, цифры, _)" style={S.input} />
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="Пароль (минимум 6 символов)" style={S.input} onKeyDown={(e) => { if (e.key === "Enter") submitAuth(); }} />
              {errorText && <div style={{ color: C.red, fontSize: 13 }}>{errorText}</div>}
              {infoText && <div style={{ color: C.green, fontSize: 13 }}>{infoText}</div>}
              <button onClick={submitAuth} disabled={loading} style={S.btn({ justifyContent: "center", background: C.accent, color: "#fff", opacity: loading ? 0.7 : 1, cursor: loading ? "not-allowed" : "pointer" })}>{loading ? "Подожди..." : mode === "login" ? "Войти" : "Создать аккаунт"}</button>
              <button onClick={onGuest} style={S.btn({ justifyContent: "center", background: C.card, color: C.textSecondary, border: `1px solid ${C.border}` })}>Продолжить как гость</button>
            </div>
          </div>
        </div>
      );
    }

    function MainApp({ session, isGuest, onLogout }) {
      const loggedInUserId = session?.user?.id ?? null;
      const [owners, setOwners] = useState([]);
      const [viewOwnerId, setViewOwnerId] = useState(null);
      const [loadingOwners, setLoadingOwners] = useState(true);
      const [words, setWords] = useState([]);
      const [loadingWords, setLoadingWords] = useState(true);
      const [tab, setTab] = useState("practice");

      const [formEn, setFormEn] = useState("");
      const [formRu, setFormRu] = useState("");
      const [formErr, setFormErr] = useState("");

      const [editingId, setEditingId] = useState(null);
      const [editEn, setEditEn] = useState("");
      const [editRu, setEditRu] = useState("");

      const [direction, setDirection] = useState("ru→en");
      const [queue, setQueue] = useState([]);
      const [current, setCurrent] = useState(null);
      const [answer, setAnswer] = useState("");
      const [result, setResult] = useState(null);
      const [hint, setHint] = useState(false);
      const [sessionRight, setSessionRight] = useState(0);
      const [sessionWrong, setSessionWrong] = useState(0);

      // Сообщение о копировании слова в свой список ("В мой список").
      // Toast: { text, type: "success" | "error" | "info" }. Показывается плавающим
      // блоком внизу по центру, поэтому виден независимо от позиции прокрутки.
      const [addMsg, setAddMsg] = useState("");
      const [addMsgType, setAddMsgType] = useState("success");

      const showToast = (text, type = "success") => {
        setAddMsgType(type);
        setAddMsg(text);
      };

      const canEdit = !!loggedInUserId && !!viewOwnerId && loggedInUserId === viewOwnerId;

      // Ключ локального прогресса: свой для гостя и для каждого просматриваемого чужого списка.
      const localProgressKey = canEdit
        ? null
        : isGuest
          ? `${PROGRESS_PREFIX}:guest`
          : (viewOwnerId ? `${PROGRESS_PREFIX}:${loggedInUserId || "anon"}:${viewOwnerId}` : null);

      const persistLocalProgress = (w) => {
        if (canEdit || !localProgressKey || !w) return;
        const map = loadProgressMap(localProgressKey);
        map[wordKeyOf(w)] = {
          successCount: w.successCount,
          learned: w.learned,
          totalRight: w.totalRight,
          totalWrong: w.totalWrong,
        };
        saveProgressMap(localProgressKey, map);
      };

      const resetLocalProgress = () => {
        if (!localProgressKey) return;
        try { localStorage.removeItem(localProgressKey); } catch (_) { /* no-op */ }
        const cleared = words.map((w) => ({ ...w, successCount: 0, learned: false, totalRight: 0, totalWrong: 0 }));
        setWords(cleared);
        setSessionRight(0);
        setSessionWrong(0);
        initQueue(cleared);
        setAnswer("");
        setResult(null);
        setHint(false);
      };

      useEffect(() => {
        async function loadOwners() {
          if (isGuest) {
            setOwners([]);
            setViewOwnerId(null);
            setLoadingOwners(false);
            return;
          }

          setLoadingOwners(true);
          const profileMap = {};
          try {
            // Таблица profiles опциональна: если ее еще нет, просто игнорируем.
            const { data: profileData } = await db.from('profiles').select('id, username, display_name');
            if (profileData) {
              profileData.forEach((p) => {
                profileMap[p.id] = p.display_name || p.username;
              });
            }
          } catch (_) {
            // no-op
          }

          let computedOwners = [];
          const metaUsername = session?.user?.user_metadata?.username;
          const myLabel = profileMap[loggedInUserId] || metaUsername || "Мой аккаунт";
          try {
            const { data, error } = await db.from('wordflow_words').select('owner_id, learned');
            if (error) throw error;
            const statByOwner = {};
            (data || []).forEach((w) => {
              if (!w.owner_id) return;
              if (!statByOwner[w.owner_id]) {
                statByOwner[w.owner_id] = { total: 0, learned: 0 };
              }
              statByOwner[w.owner_id].total += 1;
              if (w.learned) statByOwner[w.owner_id].learned += 1;
            });

            computedOwners = Object.keys(statByOwner).map((id) => ({
              id,
              label: profileMap[id] || (loggedInUserId === id ? myLabel : shortId(id)),
              total: statByOwner[id].total,
              learned: statByOwner[id].learned,
            }));
          } catch (e) {
            console.error(e);
          }

          if (loggedInUserId && !computedOwners.find((o) => o.id === loggedInUserId)) {
            computedOwners.unshift({
              id: loggedInUserId,
              label: myLabel,
              total: 0,
              learned: 0,
            });
          }

          setOwners(computedOwners);
          setViewOwnerId((prev) => {
            if (prev && computedOwners.some((o) => o.id === prev)) return prev;
            if (loggedInUserId && computedOwners.some((o) => o.id === loggedInUserId)) return loggedInUserId;
            return computedOwners[0]?.id || null;
          });
          setLoadingOwners(false);
        }
        loadOwners();
      }, [loggedInUserId, isGuest]);

      useEffect(() => {
        async function loadWords() {
          setLoadingWords(true);

          if (isGuest) {
            try {
              const { data, error } = await db.from('wordflow_words').select('en, ru');
              if (error) throw error;
              const seen = new Set();
              const uniqueWords = [];
              (data || []).forEach((w) => {
                const en = (w.en || "").trim();
                const ru = (w.ru || "").trim();
                if (!en || !ru) return;
                const key = `${norm(en)}::${norm(ru)}`;
                if (seen.has(key)) return;
                seen.add(key);
                uniqueWords.push({
                  id: `guest-${key}`,
                  en,
                  ru,
                  successCount: 0,
                  learned: false,
                  totalRight: 0,
                  totalWrong: 0,
                  ownerId: null,
                });
              });
              const guestKey = `${PROGRESS_PREFIX}:guest`;
              const withProgress = applyProgress(uniqueWords, loadProgressMap(guestKey));
              setWords(withProgress);
              initQueue(withProgress);
            } catch (e) {
              console.error(e);
              setWords([]);
            }
            setLoadingWords(false);
            return;
          }

          if (!viewOwnerId) {
            setWords([]);
            setLoadingWords(false);
            return;
          }
          try {
            const { data, error } = await db.from('wordflow_words').select('*').eq('owner_id', viewOwnerId);
            if (!error && data) {
              const mappedWords = data.map(w => ({
                id: w.id, en: w.en, ru: w.ru, successCount: w.success_count,
                learned: w.learned, totalRight: w.total_right, totalWrong: w.total_wrong,
                ownerId: w.owner_id,
              }));
              // Владелец видит реальную статистику из БД; остальные — свой локальный прогресс
              // поверх ЧИСТОГО листа, чтобы не видеть и не путать прогресс владельца.
              const isOwner = loggedInUserId && loggedInUserId === viewOwnerId;
              const finalWords = isOwner
                ? mappedWords
                : applyProgress(zeroProgress(mappedWords), loadProgressMap(`${PROGRESS_PREFIX}:${loggedInUserId || "anon"}:${viewOwnerId}`));
              setWords(finalWords);
              initQueue(finalWords);
            }
          } catch(e) { console.error(e); }
          setLoadingWords(false);
        }
        loadWords();
      }, [viewOwnerId, isGuest]);

      const activeWords = words.filter((w) => !w.learned);
      const learnedWords = words.filter((w) => w.learned);

      const initQueue = (currentWords) => {
        const active = currentWords.filter((w) => !w.learned);
        if (active.length === 0) { setCurrent(null); return; }
        const q = shuffle(active.map((w) => w.id));
        setQueue(q.slice(1));
        setCurrent(q[0]);
      };

      useEffect(() => {
        if (tab !== "practice") return;
        initQueue(words);
        setAnswer("");
        setResult(null);
        setHint(false);
      }, [tab]);

      const nextWord = (updatedWords) => {
        const active = (updatedWords ?? words).filter((w) => !w.learned);
        if (active.length === 0) { setCurrent(null); return; }
        let q = queue.filter((id) => active.find((w) => w.id === id));
        if (q.length === 0) q = shuffle(active.map((w) => w.id));
        const nextId = q[0] ?? shuffle(active.map((w) => w.id))[0];
        setQueue(q.slice(1));
        setCurrent(nextId);
        setAnswer("");
        setResult(null);
        setHint(false);
      };

      const checkAnswer = async () => {
        if (!current || result) return;
        const word = words.find((w) => w.id === current);
        if (!word) return;
        const correct = direction === "ru→en" ? word.en : word.ru;
        const isCorrect = norm(answer) === norm(correct);

        // Локальный прогресс ведётся всегда; в базу пишем ТОЛЬКО владелец (canEdit).
        // Для гостя/чужого списка прогресс остаётся в памяти и не трогает чужую статистику.
        if (isCorrect) {
          setSessionRight((n) => n + 1);
          setResult("correct");
          const newCount = (word.successCount || 0) + 1;
          const learnedStatus = newCount >= LEARNED_THRESHOLD;
          const updatedWord = { ...word, successCount: newCount, learned: learnedStatus, totalRight: (word.totalRight || 0) + 1 };
          setWords((prev) => prev.map((w) => w.id === current ? updatedWord : w));
          if (canEdit) {
            await db.from('wordflow_words').update({ success_count: newCount, learned: learnedStatus, total_right: (word.totalRight || 0) + 1 }).eq('id', current);
          } else {
            persistLocalProgress(updatedWord);
          }
        } else {
          setSessionWrong((n) => n + 1);
          setResult("wrong");
          const updatedWord = { ...word, successCount: 0, totalWrong: (word.totalWrong || 0) + 1 };
          setWords((prev) => prev.map((w) => w.id === current ? updatedWord : w));
          if (canEdit) {
            await db.from('wordflow_words').update({ success_count: 0, total_wrong: (word.totalWrong || 0) + 1 }).eq('id', current);
          } else {
            persistLocalProgress(updatedWord);
          }
        }
      };

      const handleDontRemember = async () => {
        if (!current || result) return;
        const word = words.find((w) => w.id === current);
        if (!word) return;
        setSessionWrong((n) => n + 1);
        setResult("dont_remember");
        const updatedWord = { ...word, successCount: 0, totalWrong: (word.totalWrong || 0) + 1 };
        setWords((prev) => prev.map((w) => w.id === current ? updatedWord : w));
        if (canEdit) {
          await db.from('wordflow_words').update({ success_count: 0, total_wrong: (word.totalWrong || 0) + 1 }).eq('id', current);
        } else {
          persistLocalProgress(updatedWord);
        }
        setQueue((prevQueue) => {
          const newQueue = [...prevQueue];
          const insertPosition = Math.min(newQueue.length, 3);
          newQueue.splice(insertPosition, 0, current);
          return newQueue;
        });
      };

      const addWord = async () => {
        if (!canEdit) {
          setFormErr("Добавлять слова может только владелец списка");
          return;
        }
        const en = formEn.trim(); const ru = formRu.trim();
        if (!en || !ru) { setFormErr("Заполни оба поля"); return; }
        if (words.find((w) => norm(w.en) === norm(en))) { setFormErr("Такое слово уже есть"); return; }
        const { data, error } = await db.from('wordflow_words').insert([{ owner_id: viewOwnerId, en, ru }]).select();
        if (!error && data) {
          const inserted = data[0];
          setWords((prev) => [...prev, { id: inserted.id, en: inserted.en, ru: inserted.ru, successCount: 0, learned: false, totalRight: 0, totalWrong: 0, ownerId: inserted.owner_id }]);
          setFormEn(""); setFormRu(""); setFormErr("");
        } else if (error) {
          setFormErr(error.message || "Не удалось добавить слово");
        }
      };

      // Доступно залогиненному пользователю, когда он смотрит ЧУЖОЙ список.
      const canCopyToMyList = !!loggedInUserId && !isGuest && !canEdit;

      // Копирует слово в собственный список пользователя (в БД), не трогая чужой список.
      // Там уже ведётся реальная статистика, которая синхронится между устройствами.
      const addToMyList = async (word) => {
        if (!canCopyToMyList || !word) return;
        const en = (word.en || "").trim();
        const ru = (word.ru || "").trim();
        if (!en || !ru) return;
        try {
          // Не дублируем: проверяем, есть ли уже такое слово в моём списке.
          const { data: existing } = await db
            .from('wordflow_words')
            .select('id')
            .eq('owner_id', loggedInUserId)
            .ilike('en', en)
            .maybeSingle();
          if (existing) {
            showToast(`«${en}» уже есть в твоём списке`, "info");
          } else {
            const { error } = await db.from('wordflow_words').insert([{ owner_id: loggedInUserId, en, ru }]);
            if (error) {
              showToast(error.message || "Не удалось добавить", "error");
            } else {
              showToast(`«${en}» добавлено в твой список`, "success");
            }
          }
        } catch (e) {
          showToast("Не удалось добавить", "error");
        }
        setTimeout(() => setAddMsg(""), 2500);
      };

      const saveEditedWord = async (id) => {
        if (!canEdit) return;
        const en = editEn.trim(); const ru = editRu.trim();
        if (!en || !ru) return;
        const { error } = await db.from('wordflow_words').update({ en, ru }).eq('id', id);
        if (!error) {
          setWords((prev) => prev.map((w) => w.id === id ? { ...w, en, ru } : w));
          setEditingId(null);
        }
      };

      const startEditing = (word) => {
        if (!canEdit) return;
        setEditingId(word.id);
        setEditEn(word.en);
        setEditRu(word.ru);
      };

      const deleteWord = async (id) => {
        if (!canEdit) return;
        const { error } = await db.from('wordflow_words').delete().eq('id', id);
        if (!error) {
          setWords((prev) => {
            const updated = prev.filter((w) => w.id !== id);
            if (current === id) nextWord(updated);
            return updated;
          });
        }
      };

      const restoreWord = async (id) => {
        if (!canEdit) return;
        const { error } = await db.from('wordflow_words').update({ learned: false, success_count: 0 }).eq('id', id);
        if (!error) {
          setWords((prev) => prev.map((w) => w.id === id ? { ...w, learned: false, successCount: 0 } : w));
        }
      };

      const currentWord = words.find((w) => w.id === current);
      const question      = currentWord ? (direction === "ru→en" ? currentWord.ru : currentWord.en) : "";
      const correctAnswer = currentWord ? (direction === "ru→en" ? currentWord.en : currentWord.ru) : "";

      if (loadingOwners || loadingWords) {
        return <div style={{ background: C.bg, minHeight: "100vh", color: C.textSecondary, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>Синхронизация...</div>;
      }

      const ownerMeta = owners.find((o) => o.id === viewOwnerId);
      const headerName = isGuest ? "Гостевой режим" : (ownerMeta?.label || "Пользователь");
      const headerState = isGuest
        ? `Уникальных слов: ${words.length} · только тренировка`
        : `${activeWords.length} активных · ${learnedWords.length} изучено ${canEdit ? "· владелец" : "· только просмотр"}`;

      return (
        <div style={{ background: C.bg, minHeight: "100vh", color: C.textPrimary, fontFamily: "Inter, system-ui, sans-serif" }}>
          {/* Шапка */}
          <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "12px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              <div style={{ fontSize: 24 }}>👤</div>
              <div>
                <div style={{ fontWeight: 800, fontSize: 16, lineHeight: 1.1 }}>{headerName}</div>
                <div style={{ fontSize: 11, color: C.textMuted }}>{headerState}</div>
              </div>
            </div>
            <button onClick={onLogout} style={S.btn({ background: C.card, color: C.textSecondary, border: `1px solid ${C.border}`, padding: "7px 12px", fontSize: 13 })}><Icons.logout /> {isGuest ? "Войти" : "Выйти"}</button>
          </div>

          {!isGuest && (
            <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "10px 16px" }}>
              <div style={{ maxWidth: 520, margin: "0 auto", display: "flex", flexDirection: "column", gap: 6 }}>
                <div style={{ color: C.textMuted, fontSize: 12 }}>Чей список просматривать</div>
                <select value={viewOwnerId || ""} onChange={(e) => { setViewOwnerId(e.target.value); setEditingId(null); }} style={{ ...S.input, padding: "8px 10px" }}>
                  {owners.map((o) => (
                    <option key={o.id} value={o.id}>{o.label} ({o.total} слов, {o.learned} изучено)</option>
                  ))}
                </select>
              </div>
            </div>
          )}

          {/* Навигация */}
          <div style={{ display: "flex", background: C.surface, borderBottom: `1px solid ${C.border}` }}>
            {[
              { id: "practice", label: "Практика", icon: <Icons.book /> },
              { id: "list",     label: "Слова",    icon: <Icons.list /> },
              { id: "learned",  label: "Изученные", icon: <Icons.star /> },
            ].map((t) => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: "none", border: "none", cursor: "pointer", padding: "12px 8px", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, color: tab === t.id ? C.accent : C.textSecondary, borderBottom: `2px solid ${tab === t.id ? C.accent : "transparent"}`, fontFamily: "inherit", fontSize: 13, fontWeight: 600, transition: "all .15s" }}>
                {t.icon} {t.label}
              </button>
            ))}
          </div>

          <div style={{ maxWidth: 520, margin: "0 auto", padding: "20px 16px" }}>

            {/* ПРАКТИКА */}
            {tab === "practice" && (
              <div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
                  <button onClick={() => { setDirection(d => d === "ru→en" ? "en→ru" : "ru→en"); setResult(null); setAnswer(""); setHint(false); }} style={S.btn({ background: C.card, color: C.textPrimary, border: `1px solid ${C.border}` })}><Icons.swap /> {direction === "ru→en" ? "РУ → EN" : "EN → РУ"}</button>
                  <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                    <span style={{ fontSize: 14, color: C.green, fontWeight: 700 }}>✓ {sessionRight}</span>
                    <span style={{ fontSize: 14, color: C.red, fontWeight: 700 }}>✗ {sessionWrong}</span>
                    <button onClick={() => { setSessionRight(0); setSessionWrong(0); nextWord(); }} style={{ background: "none", border: "none", cursor: "pointer", color: C.textMuted, padding: 4, display: "flex" }}><Icons.refresh /></button>
                    {localProgressKey && (
                      <button onClick={resetLocalProgress} title="Сбросить локальный прогресс (сохранён в этом браузере)" style={S.btn({ background: C.card, color: C.textSecondary, border: `1px solid ${C.border}`, padding: "5px 10px", fontSize: 12 })}><Icons.trash /> Сбросить</button>
                    )}
                  </div>
                </div>


                {activeWords.length === 0 ? (
                  <div style={{ textAlign: "center", padding: "60px 20px" }}>
                    <div style={{ fontSize: 52, marginBottom: 16 }}>{words.length === 0 ? "📝" : "🎉"}</div>
                    <div style={{ fontWeight: 700, fontSize: 20, marginBottom: 8 }}>{words.length === 0 ? "Список пуст" : "Все слова изучены!"}</div>
                  </div>
                ) : currentWord ? (
                  <div>
                    <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 10, gap: 4 }}>
                      {Array.from({ length: LEARNED_THRESHOLD }).map((_, i) => (
                        <div key={i} style={{ width: 30, height: 6, borderRadius: 3, background: i < (currentWord.successCount || 0) ? C.accent : C.border, transition: "background .3s" }} />
                      ))}
                    </div>

                    <div style={{ background: C.card, border: `1.5px solid ${result === "correct" ? C.green : (result === "wrong" || result === "dont_remember") ? C.red : C.border}`, borderRadius: 16, padding: "36px 28px", textAlign: "center", marginBottom: 16 }}>
                      <div style={{ fontSize: 11, color: C.textMuted, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 10 }}>{direction === "ru→en" ? "Переведи на английский" : "Переведи на русский"}</div>
                      <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: "-0.5px", lineHeight: 1.3 }}>{question}</div>
                      {result && (
                        <div style={{ marginTop: 20, padding: "10px 16px", borderRadius: 10, background: result === "correct" ? C.greenSoft : C.redSoft, color: result === "correct" ? C.green : C.red, fontWeight: 600, fontSize: 15 }}>
                          {result === "correct" ? "✓ Правильно!" : result === "dont_remember" ? `В следующий раз получится! Ответ: ${correctAnswer}` : `✗ Ошибка. Правильный ответ: ${correctAnswer}`}
                        </div>
                      )}
                    </div>

                    {!result && (
                      <div style={{ marginBottom: 12 }}>
                        <input maxLength={80} value={answer} onChange={(e) => setAnswer(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") checkAnswer(); }} placeholder="Введи перевод…" style={{ ...S.input, fontSize: 17, padding: "14px 16px", textAlign: "center" }} autoFocus />
                      </div>
                    )}

                    {!result && (
                      <div style={{ display: "flex", gap: 10, marginBottom: 12 }}>
                        <button onClick={handleDontRemember} style={S.btn({ flex: 1, background: C.redSoft, color: C.red, border: `1px solid ${C.red}33`, justifyContent: "center" })}><Icons.eyeOff /> Не помню</button>
                        <button onClick={checkAnswer} style={S.btn({ flex: 2, background: C.accent, color: "#fff", justifyContent: "center", fontSize: 15 })}>Проверить</button>
                      </div>
                    )}

                    {!result && (
                      <button onClick={() => setHint(true)} style={S.btn({ width: "100%", background: C.card, color: C.textSecondary, border: `1px solid ${C.border}`, justifyContent: "center", marginBottom: 12 })}>👁 Подсказать первую букву</button>
                    )}

                    {canCopyToMyList && (
                      <button onClick={() => addToMyList(currentWord)} style={S.btn({ width: "100%", background: C.surface, color: C.accent, border: `1px solid ${C.accent}55`, justifyContent: "center", marginBottom: 12 })}><Icons.plus /> В мой список</button>
                    )}

                    {hint && !result && (
                      <div style={{ background: C.yellowSoft, border: `1px solid ${C.yellow}`, borderRadius: 10, padding: "10px 14px", marginBottom: 12, color: C.yellow, fontSize: 14, fontWeight: 600, textAlign: "center" }}>Начинается на: «{correctAnswer.slice(0, 2)}…»</div>
                    )}

                    {result && (
                      <button onClick={() => nextWord()} style={S.btn({ width: "100%", justifyContent: "center", background: C.accent, color: "#fff", fontSize: 15, padding: "13px" })}>Следующее слово →</button>
                    )}
                  </div>
                ) : null}
              </div>
            )}

            {/* СПИСОК СЛОВ */}
            {tab === "list" && (
              <div>
                {canEdit ? (
                  <div style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 14, padding: 16, marginBottom: 20 }}>
                    <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 12, color: C.textSecondary, textTransform: "uppercase", letterSpacing: 1 }}>Добавить слово или фразу</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                      <input maxLength={80} value={formEn} onChange={(e) => setFormEn(e.target.value)} placeholder="English" style={S.input} />
                      <input maxLength={80} value={formRu} onChange={(e) => setFormRu(e.target.value)} placeholder="Русский" style={S.input} onKeyDown={(e) => e.key === "Enter" && addWord()} />
                      {formErr && <div style={{ color: C.red, fontSize: 13 }}>{formErr}</div>}
                      <button onClick={addWord} style={S.btn({ background: C.accent, color: "#fff", justifyContent: "center" })}><Icons.plus /> Добавить</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 14, padding: 14, marginBottom: 20, color: C.textSecondary, fontSize: 13 }}>
                    Этот список открыт в режиме только чтение. Твой прогресс по нему хранится отдельно и не влияет на статистику владельца.{canCopyToMyList ? " Кнопкой «+» можно скопировать слово в свой список — там прогресс пишется в базу." : ""}
                  </div>
                )}


                {activeWords.length === 0 ? (
                  <div style={{ textAlign: "center", color: C.textMuted, padding: "40px 0" }}>Список пуст.</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {activeWords.map((w) => (
                      <div key={w.id} style={{ background: C.card, border: `1.5px solid ${editingId === w.id ? C.accent : C.border}`, borderRadius: 12, padding: "12px 14px", display: "flex", alignItems: "center", gap: 12 }}>
                        {editingId === w.id ? (
                          <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 6 }}>
                            <input value={editEn} onChange={(e) => setEditEn(e.target.value)} style={{ ...S.input, padding: "6px 10px" }} />
                            <input value={editRu} onChange={(e) => setEditRu(e.target.value)} style={{ ...S.input, padding: "6px 10px" }} onKeyDown={(e) => e.key === "Enter" && saveEditedWord(w.id)} />
                          </div>
                        ) : (
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontWeight: 700, fontSize: 15, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{w.en}</div>
                            <div style={{ color: C.textSecondary, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{w.ru}</div>
                          </div>
                        )}
                        <div style={{ display: "flex", gap: 3, flexShrink: 0 }}>
                          {Array.from({ length: LEARNED_THRESHOLD }).map((_, i) => (
                            <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: i < (w.successCount || 0) ? C.accent : C.border }} />
                          ))}
                        </div>
                        {canEdit && (
                          <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                            {editingId === w.id ? (
                              <button onClick={() => saveEditedWord(w.id)} style={{ background: C.greenSoft, border: "none", cursor: "pointer", color: C.green, padding: 6, borderRadius: 6, display: "flex" }}><Icons.save /></button>
                            ) : (
                              <button onClick={() => startEditing(w)} style={{ background: "none", border: "none", cursor: "pointer", color: C.textMuted, padding: 6, borderRadius: 6, display: "flex" }}><Icons.edit /></button>
                            )}
                            <button onClick={() => deleteWord(w.id)} style={{ background: "none", border: "none", cursor: "pointer", color: C.textMuted, padding: 6, borderRadius: 6, display: "flex" }}><Icons.trash /></button>
                          </div>
                        )}
                        {canCopyToMyList && (
                          <button onClick={() => addToMyList(w)} title="Добавить в мой список" style={{ background: C.surface, border: `1px solid ${C.accent}55`, cursor: "pointer", color: C.accent, padding: 6, borderRadius: 6, display: "flex", flexShrink: 0 }}><Icons.plus /></button>
                        )}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* ИЗУЧЕННЫЕ */}
            {tab === "learned" && (
              <div>
                <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 16, color: C.textSecondary }}>Изученные слова ({learnedWords.length})</div>
                {learnedWords.length === 0 ? (
                  <div style={{ textAlign: "center", color: C.textMuted, padding: "40px 0" }}>Пока пусто.</div>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    {learnedWords.map((w) => (
                      <div key={w.id} style={{ background: C.card, border: `1.5px solid ${C.greenSoft}`, borderRadius: 12, padding: "12px 14px", display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ color: C.green, flexShrink: 0 }}><Icons.star /></div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontWeight: 700, fontSize: 15, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{w.en}</div>
                          <div style={{ color: C.textSecondary, fontSize: 13, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{w.ru}</div>
                        </div>
                        {canEdit && <button onClick={() => restoreWord(w.id)} style={S.btn({ background: C.surface, color: C.textSecondary, border: `1px solid ${C.border}`, padding: "6px 10px", fontSize: 12, gap: 4 })}><Icons.repeat /> Заново</button>}
                        {canEdit && <button onClick={() => deleteWord(w.id)} style={{ background: "none", border: "none", cursor: "pointer", color: C.textMuted, padding: 4, borderRadius: 6, display: "flex" }}><Icons.trash /></button>}
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}
          </div>

          {/* Плавающее уведомление (toast): фиксировано внизу по центру,
              видно независимо от прокрутки — даже при добавлении слова из конца списка. */}
          {addMsg && (
            <div
              style={{
                position: "fixed",
                left: "50%",
                bottom: 24,
                transform: "translateX(-50%)",
                zIndex: 1000,
                maxWidth: "calc(100vw - 32px)",
                padding: "12px 18px",
                borderRadius: 12,
                fontSize: 14,
                fontWeight: 600,
                textAlign: "center",
                boxShadow: "0 8px 24px rgba(0,0,0,0.4)",
                animation: "wf-toast-in .2s ease",
                background: addMsgType === "error" ? C.redSoft : addMsgType === "info" ? C.yellowSoft : C.greenSoft,
                color: addMsgType === "error" ? C.red : addMsgType === "info" ? C.yellow : C.green,
                border: `1.5px solid ${addMsgType === "error" ? C.red : addMsgType === "info" ? C.yellow : C.green}66`,
              }}
            >
              {addMsgType === "error" ? "⚠️ " : addMsgType === "info" ? "ℹ️ " : "✓ "}{addMsg}
            </div>
          )}
        </div>
      );
    }

    function App() {
      const [session, setSession] = useState(null);
      const [isGuest, setIsGuest] = useState(false);
      const [loadingSession, setLoadingSession] = useState(true);

      useEffect(() => {
        db.auth.getSession().then(({ data }) => {
          setSession(data.session || null);
          setLoadingSession(false);
        });
        const { data: listener } = db.auth.onAuthStateChange((_event, nextSession) => {
          setSession(nextSession || null);
          if (nextSession) setIsGuest(false);
        });
        return () => {
          listener?.subscription?.unsubscribe();
        };
      }, []);

      const handleLogout = async () => {
        if (session) {
          await db.auth.signOut();
          setSession(null);
        }
        setIsGuest(false);
      };

      if (loadingSession) {
        return <div style={{ background: C.bg, minHeight: "100vh", color: C.textSecondary, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Inter, sans-serif" }}>Проверка сессии...</div>;
      }

      if (!session && !isGuest) {
        return <AuthScreen onGuest={() => setIsGuest(true)} />;
      }

      return <MainApp session={session} isGuest={isGuest} onLogout={handleLogout} />;
    }

    try {
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    } catch (e) {
      const r = document.getElementById('root');
      if (r) r.textContent = "Ошибка запуска: " + (e && e.message ? e.message : e);
    }
  </script>
</body>
</html>
